name: frontend code check and vulnerability audit
on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/fe-code-check-and-audit.yml'

defaults:
  run:
    working-directory: frontend

env:
  NODE_VERSION: "24.14.1"

jobs:
  "build (1/2)":
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          
      - name: install and build
        run: |
          npm ci
          npm run build

  "audit (2/2)":
    runs-on: ubuntu-latest
    needs: "build (1/2)"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: run vulnerability audit
        run: npm audit --audit-level=high