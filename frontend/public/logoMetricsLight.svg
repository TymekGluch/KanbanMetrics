  </text>

  <text x="132" y="116"
        font-family="Arial, sans-serif"
        font-size="16"
        font-weight="600"
        fill="#075985"
        letter-spacing="5"
        opacity="0.95">
    METRICS
  </text>

  <!-- Subtle underline -->
  <line x1="130" y1="110" x2="470" y2="110"
        stroke="url(#g1)" stroke-width="2" opacity="0.8"/>
